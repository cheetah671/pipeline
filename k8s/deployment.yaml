apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-pipeline-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-pipeline-api
  template:
    metadata:
      labels:
        app: market-pipeline-api
    spec:
      containers:
        - name: api
          image: market-pipeline:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: market-pipeline-api
spec:
  selector:
    app: market-pipeline-api
  ports:
    - port: 80
      targetPort: 8000
